<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Bienes CORPO-SALUD</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <h1>🏛️ Sistema de Bienes Nacionales</h1>
            <p class="subtitle">CORPORACION DE SALUD DEL ESTADO TACHIRA</p>
            <form method="POST" class="login-form">
                {% if error %}
                <div class="message error">{{ error }}</div>
                {% endif %}
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" required autofocus>
                </div>
                <div class="form-group">
                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" name="contrasena" required>
                </div>
                <button type="submit" class="btn-primary btn-block">Ingresar</button>
            </form>
            <p class="login-hint">Usuario: admin | Contraseña: admin123</p>
        </div>
    </div>
</body>
</html>
